<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b0a0a"/>
      <stop offset="1" stop-color="#8f1010"/>
    </linearGradient>
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fffb" />
      <stop offset="0.5" stop-color="#0000" />
      <stop offset="1" stop-color="#0006" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Curtain folds -->
  <g opacity="0.55">
    <rect x="70"  y="0" width="140" height="900" fill="url(#fold)"/>
    <rect x="240" y="0" width="160" height="900" fill="url(#fold)"/>
    <rect x="440" y="0" width="150" height="900" fill="url(#fold)"/>
    <rect x="620" y="0" width="170" height="900" fill="url(#fold)"/>
    <rect x="820" y="0" width="150" height="900" fill="url(#fold)"/>
    <rect x="1000" y="0" width="170" height="900" fill="url(#fold)"/>
    <rect x="1200" y="0" width="150" height="900" fill="url(#fold)"/>
    <rect x="1380" y="0" width="150" height="900" fill="url(#fold)"/>
  </g>

  <!-- Top valance -->
  <path d="M0,0 H1600 V120 C1380,150 1180,90 980,130 C760,175 560,95 340,130 C180,155 80,110 0,120 Z" fill="#3d0707"/>
  <path d="M0,0 H1600 V80 C1390,110 1180,70 980,100 C760,135 560,70 340,100 C180,120 80,85 0,80 Z" fill="#2e0505" opacity="0.55"/>

  <!-- Soft spotlight center -->
  <g filter="url(#soft)" opacity="0.35">
    <ellipse cx="800" cy="430" rx="520" ry="320" fill="#ffffff"/>
  </g>
</svg>

